<head>

<title>Insert title here</title>
<link rel="stylesheet" th:href="@{/css/bootstrap.min.css}"/>
</head>
<body>
	<div class="container">
		<form th:action="@{/deleteStudent}" th:method="post">

			</div>
		
		</form>
	
	</div>
