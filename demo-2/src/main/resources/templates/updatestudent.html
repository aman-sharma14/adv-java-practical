<!DOCTYPE html>
<html xmlns:th="www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<link rel="stylesheet" th:href="@{/css/bootstrap.min.css}"/>
</head>
<body>
	<div class="container">
		<form th:action="@{/saveupdate}" th:object="${student}" th:method="post">
			<div class="form-group">
				<h3>Update Student</h3>
			</div>
			
			<div class="form-group">
				<label>Id</label>
				<input type="number" th:field=*{uid} class="form-control" readonly/>
			</div>
			
			<div class="form-group">
				<label>Name</label>
				<input type="text" th:field=*{name} class="form-control"/>
			</div>
			
			<div class="form-group">
				<label>Gender</label>
				<input type="text" th:field=*{gender} class="form-control"/>
			</div>
			
			<div class="form-group">
				<label>Stream</label>
				<input type="text" th:field=*{stream} class="form-control"/>
			</div>
			
			<div class="form-group">
				<button class="btn btn-primary">Save</button>
				<a th:href="@{/viewAllStudents}" class="btn">Back</a>
			</div>
		
		</form>
	
	</div>
</body>
</html>
