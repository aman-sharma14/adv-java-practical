<!DOCTYPE html>
<html xmlns:th="www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<link rel="stylesheet" th:href="@{/css/bootstrap.min.css}"/>
</head>
<body>
	<div class="container">
		<form th:action="@{/saveStudent}" th:object="${student}" th:method="post">
			<div class="form-group">
				<h3>Add Student</h3>
			</div>
			
			<div class="form-group">
				<label>Enter id</label>
				<input type="number" th:field=*{uid} class="form-control"/>
			</div>
			
			<div class="form-group">
				<label>Enter name</label>
				<input type="text" th:field=*{name} class="form-control"/>
			</div>
			<div class="form-group">
				<label>Enter stream</label>
				<input type="text" th:field=*{stream} class="form-control"/>
			</div>
			<div class="form-group">
				<label>Enter gender</label>
				<input type="text" th:field=*{gender} class="form-control"/>
			</div>
			
			
			
			<div class="form-group">
				<button class="btn btn-primary">Save</button>
			</div>
		
		</form>
	
	</div>
</body>
</html>
