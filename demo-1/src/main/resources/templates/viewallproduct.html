<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>All Products</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}" />
</head>
<body>

<div class="container mt-5">
    
    <h2 class="mb-4">Inventory Dashboard</h2>

    <table class="table table-striped table-hover">
        <thead class="thead-dark">
            <tr>
                <th>Product ID</th>
                <th>Product Name</th>
                <th>Price</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${allproducts}">
                
                <td th:text="${p.id}"></td>
                <td th:text="${p.name}"></td>
                <td th:text="${p.price}"></td>
                
                <td>
                   <a th:href="@{/updateproductform/{id}(id=${p.id})}" class="btn btn-warning btn-sm">Edit</a>
                    <a th:href="@{/deleteproduct/{id}(id=${p.id})}" class="btn btn-danger btn-sm">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>

    <a th:href="@{/addproduct}" class="btn btn-success mt-3">Add New Product</a>

</div>

</body>
</html>
