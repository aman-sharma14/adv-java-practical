<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>
<body>
	<h2>Add a New Product to the Database</h2>
	<div class="container">
    <form th:action="@{/saveProduct}" th:object="${product}" method="post">
        
        <div class="form-group">
        	<label>Product ID:</label>
        	<input type="number" th:field="*{id}" required class="form-control" />
        	
        </div>
        
        <div class="form-group">
        	<label>Product Name:</label>
        	<input type="text" th:field="*{name}" required class="form-control"/>
        </div>
        
        <div class="form-group">
        	<label>Product Price:</label>
        	<input type="number" step="0.01" th:field="*{price}" required class="form-control"/>
        	
        </div>
        
        <div class="form-group">
        	<button type="submit" class="btn btn-primary">Save Product</button>
        </div>

        
        
        
    </form>
    </div>
</body>
</html>
